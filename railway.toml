[build]
builder = "NIXPACKS"

[deploy]
startCommand = "bash ./start.sh"
healthcheckPath = "/health/ready"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Add worker service for Celery
[[services]]
name = "worker"
startCommand = "celery -A celery worker --loglevel=info --concurrency=2"
